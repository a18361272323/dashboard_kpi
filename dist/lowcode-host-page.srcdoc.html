<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920" />
<title>数据大屏</title>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body,#app{width:100%;height:100%;overflow:hidden}</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  var M='https://cdn.jsdelivr.net/gh/a18361272323/dashboard_kpi@b381db7/dist/microfrontend-assets.direct.json';
  var B='https://cdn.jsdelivr.net/gh/a18361272323/dashboard_kpi@b381db7/dist/';
  var manifest=null;
  function L(u,t){
    return new Promise(function(r,j){
      if(t){
        var s=document.createElement('script');s.src=u;s.onload=r;s.onerror=function(){j(new Error('js '+u))};document.body.appendChild(s);
      }else{
        var l=document.createElement('link');l.rel='stylesheet';l.href=u;l.onload=r;l.onerror=function(){j(new Error('css '+u))};document.head.appendChild(l);
      }
    });
  }
  fetch(M,{cache:'no-cache'}).then(function(r){return r.json()}).then(function(m){
    manifest=m;
    return Promise.all((m.css||[]).map(function(u){return L(B+u,0)}));
  }).then(function(){
    return Promise.all((manifest.js||[]).map(function(u){return L(B+u,1)}));
  }).catch(function(e){
    document.getElementById('app').textContent='Load failed: '+e.message;
  });
})();
</script>
</body>
</html>
