<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据大屏</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      const assetManifestUrl = "https://cdn.jsdelivr.net/gh/a18361272323/dashboard_kpi@cf22502/dist/microfrontend-assets.direct.json";
      const appRoot = document.getElementById("app");

      function resolveAssetUrl(value) {
        return new URL(value, assetManifestUrl).href;
      }

      function appendStylesheet(url) {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.crossOrigin = "anonymous";
        link.href = resolveAssetUrl(url);
        document.head.appendChild(link);
      }

      function appendModuleScript(url) {
        const script = document.createElement("script");
        script.type = "module";
        script.crossOrigin = "anonymous";
        script.src = resolveAssetUrl(url);
        document.body.appendChild(script);
      }

      function readAssetList(manifest, key) {
        if (Array.isArray(manifest[key])) return manifest[key];
        if (manifest.assets && Array.isArray(manifest.assets[key])) return manifest.assets[key];
        return [];
      }

      fetch(assetManifestUrl, { cache: "no-cache" })
        .then((response) => {
          if (!response.ok) throw new Error("asset manifest " + response.status);
          return response.json();
        })
        .then((manifest) => {
          readAssetList(manifest, "css").forEach(appendStylesheet);
          readAssetList(manifest, "js").forEach(appendModuleScript);
        })
        .catch((error) => {
          appRoot.textContent = "Microfrontend asset manifest load failed: " + error.message;
          appRoot.style.padding = "16px";
          appRoot.style.fontFamily = "system-ui, sans-serif";
          appRoot.style.color = "#b42318";
        });
    </script>
  </body>
</html>
