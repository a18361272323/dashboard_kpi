<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>数据大屏</title>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body,#app{width:100%;height:100%;overflow:hidden}</style>
</head>
<body><div id="app"></div>
<script>
(function() {
  var M = 'https://cdn.jsdelivr.net/gh/a18361272323/dashboard_kpi@2ee14f1/dist/microfrontend-assets.json';
  var B = 'https://cdn.jsdelivr.net/gh/a18361272323/dashboard_kpi@2ee14f1/dist/';
  function L(u,t) { var e = t ? document.createElement('script') : document.createElement('link');
    if(t){e.src=u;document.body.appendChild(e);}else{e.rel='stylesheet';e.href=u;document.head.appendChild(e);}
    return new Promise(function(r){e.onload=r;e.onerror=r;}); }
  fetch(M).then(function(r){return r.json();}).then(function(m){
    return Promise.all(m.css.map(function(u){return L(B+u,0);}));
  }).then(function(){ return Promise.all(m.js.map(function(u){return L(B+u,1);})); });
})();
</script>
</body>
</html>
