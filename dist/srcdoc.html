<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>数据大屏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #app { width: 100%; height: 100%; overflow: hidden; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  var MANIFEST_URL = 'https://cdn.jsdelivr.net/gh/a18361272323/dashboard_kpi@2ee14f1/dist/microfrontend-assets.json';
  var BASE = 'https://cdn.jsdelivr.net/gh/a18361272323/dashboard_kpi@2ee14f1/dist/';
  
  function loadCSS(url, cb) { var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = url; l.onload = cb; document.head.appendChild(l); }
  function loadJS(url, cb) { var s = document.createElement('script'); s.src = url; s.onload = cb; document.body.appendChild(s); }
  function loadAll(list, loader) {
    return new Promise(function(resolve) {
      var i = 0;
      function next() { if (i < list.length) { loader(BASE + list[i], next); i++; } else resolve(); }
      next();
    });
  }

  fetch(MANIFEST_URL).then(function(r) { return r.json(); }).then(function(m) {
    loadAll(m.css, loadCSS).then(function() {
      loadAll(m.js, loadJS);
    });
  });
})();
</script>
</body>
</html>
